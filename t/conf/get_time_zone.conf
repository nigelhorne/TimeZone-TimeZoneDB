# t/conf/get_time_zone.conf
# Fuzz config for TimeZone::TimeZoneDB->get_time_zone
# Run this through https://github.com/nigelhorne/Test-Corpus

use strict;
use warnings;

# --- Module / method ---
our $module = 'TimeZone::TimeZoneDB';
our $function = 'get_time_zone';

# --- Constructor arguments (none) ---
our $new = undef;

# --- Input specification ---
our %input = (
	latitude => { type => 'number', min => -90, max => 90 },
	longitude => { type => 'number', min => -180, max => 180 },
);

# --- Output specification ---
our %output = (
	type => { type => 'hashref', min => 1 },
);

# --- Optional edge cases for fuzzing ---
our %edge_cases = (
	latitude => [ -90, 0, 90, -0.0001, 0.0001 ],
	longitude => [ -180, 0, 180, -0.0001, 0.0001 ],
);

# --- Optional type-based edge cases ---
our %type_edge_cases = (
	Num => [ 0, -1, 1, 1e6, -1e6, 'NaN' ],
);

# --- YAML corpus reference ---
our $yaml_cases = 't/conf/get_time_zone.yml';

# --- Fuzz configuration ---
our $seed = 12345;	# reproducible seed
our $iterations = 50;	 # number of fuzz iterations
